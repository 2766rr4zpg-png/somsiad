    <script>
        // ============================================

        const SUPABASE_URL = 'https://fzqmlolqkydcxwbukexh.supabase.co';

        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        
        // ============================================
        // POLISH PHONE VALIDATION
        // ============================================
        
        function validatePolishPhone(phone) {
            // Remove spaces, dashes
            const cleaned = phone.replace(/[\s\-]/g, '');
            
            // Format: +48XXXXXXXXX (9 digits after +48)
            const polishPhoneRegex = /^\+48[0-9]{9}$/;
            
            if (!polishPhoneRegex.test(cleaned)) {
                return {
                    valid: false,
                    message: '❌ Nieprawidłowy numer!\n\nWymagany format:\n+48 123 456 789\n\n🇵🇱 Dopuszczamy TYLKO polskie numery dla bezpieczeństwa.'
                };
            }
            
            // Check if not starting with 00 (old landlines)
            if (cleaned.startsWith('+4800')) {
                return {
                    valid: false,
                    message: '❌ Numer stacjonarny nie jest akceptowany.\n\nWymagany numer komórkowy.'
                };
            }
            
            return {
                valid: true,
                normalized: cleaned
            };
        }
        
        // Auto-format phone input
        document.addEventListener('DOMContentLoaded', function() {
            const phoneInput = document.getElementById('registerPhone');
            if (phoneInput) {
                phoneInput.addEventListener('input', function(e) {
                    let value = e.target.value;
                    
                    // Remove everything except digits and +
                    value = value.replace(/[^\d+]/g, '');
                    
                    // Add +48 if not present
                    if (!value.startsWith('+48')) {
                        if (value.startsWith('48')) {
                            value = '+' + value;
                        } else if (value.startsWith('+')) {
                            value = '+48' + value.substring(1);
                        } else if (value.length > 0) {
                            value = '+48' + value;
                        }
                    }
                    
                    // Limit to 12 characters (+48 + 9 digits)
                    value = value.substring(0, 12);
                    
                    // Format visually: +48 XXX XXX XXX
                    if (value.length > 3) {
                        const base = value.substring(0, 3);
                        const rest = value.substring(3);
                        const formatted = base + ' ' + (rest.match(/.{1,3}/g)?.join(' ') || rest);
                        e.target.value = formatted;
                    } else {
                        e.target.value = value;
                    }
                });
            }
        });
        
        // ============================================
        // BETA INFO
        // ============================================

        // ============================================
        // USER LIMITS FOR NEW ACCOUNTS
        // ============================================
        
        async function checkNewUserLimits(user, listingData) {
            if (user.verification_type === 'new') {
                // Limit for shopping
                if (listingData.category === 'zakupy' && listingData.price > 100) {
                    alert('❌ Nowi użytkownicy: maksymalnie 100 PLN na zakupy.\n\nPo 30 dniach i 5 transakcjach limit znika.');
                    return false;
                }
                
                // Limit listings per day
                const { count } = await supabase
                    .from('listings')
                    .select('*', { count: 'exact', head: true })
                    .eq('user_id', user.id)
                    .gte('created_at', new Date(Date.now() - 24*60*60*1000).toISOString());
                
                if (count >= 3) {
                    alert('❌ Nowi użytkownicy: maksymalnie 3 ogłoszenia/24h.\n\nPo weryfikacji konta bez limitu.');
                    return false;
                }
            }
            
            return true;
        }
        
        // ============================================
        // TRANSACTION WORKFLOW
        // ============================================
        
        async function startTransaction(listingId) {
            const user = await getCurrentUser();
            if (!user) {
                alert('❌ Musisz być zalogowany aby pomóc!');
                return;
            }
            
            const listing = await getListingById(listingId);
            
            if (!listing) {
                alert('❌ Ogłoszenie nie znalezione');
                return;
            }
            
            // Check if already applied
            const { data: existing } = await supabase
                .from('transactions')
                .select('*')
                .eq('listing_id', listingId)
                .eq('executor_id', user.id)
                .single();
            
            if (existing) {
                alert('✅ Już zgłosiłeś/aś chęć pomocy!\n\nStatus: ' + existing.status);
                return;
            }
            
            const { data, error } = await supabase
                .from('transactions')
                .insert([{
                    listing_id: listingId,
                    executor_id: user.id,
                    client_id: listing.user_id,
                    status: 'pending'
                }])
                .select();
            
            if (error) {
                alert('❌ Błąd: ' + error.message);
                return;
            }
            
            alert('✅ Zgłoszenie wysłane!\n\nKlient dostanie powiadomienie i może zaakceptować Twoją pomoc.\n\n📱 Twój numer telefonu zostanie odkryty dla klienta.');
            
            // Update UI
            location.reload();
        }
        
        async function confirmTransaction(transactionId) {
            const user = await getCurrentUser();
            
            const { data, error } = await supabase
                .from('transactions')
                .update({
                    status: 'completed',
                    completed_at: new Date().toISOString()
                })
                .eq('id', transactionId)
                .or(`executor_id.eq.${user.id},client_id.eq.${user.id}`)
                .select();
            
            if (error) {
                alert('❌ Błąd: ' + error.message);
                return;
            }
            
            alert('✅ Transakcja potwierdzona!\n\nTeraz możecie sobie nawzajem wystawić oceny.\n\nDziękujemy za korzystanie z Somsiad.pl! 🎉');
            
            location.reload();
        }
        
        // ============================================
        // REVIEW VALIDATION
        // ============================================
        
        async function checkCanReview(listingId, reviewedUserId) {
            const user = await getCurrentUser();
            if (!user) return false;
            
            // Check if transaction exists and is completed
            const { data: transaction, error } = await supabase
                .from('transactions')
                .select('*')
                .eq('listing_id', listingId)
                .or(`executor_id.eq.${user.id},client_id.eq.${user.id}`)
                .eq('status', 'completed')
                .single();
            
            if (error || !transaction) {
                alert('❌ Możesz ocenić tylko po zrealizowanej transakcji!\n\nAby dodać ocenę:\n1. Kliknij "Chcę pomóc" w ogłoszeniu\n2. Wykonaj usługę\n3. Obie strony potwierdzą wykonanie\n4. Wtedy możesz ocenić\n\nTo zapobiega fałszywym ocenom! 🛡️');
                return false;
            }
            
            return true;
        }
        
        // ============================================
        // GDPR - DELETE ACCOUNT
        // ============================================
        
        async function deleteMyAccount() {
            if (!confirm('❌ CZY NA PEWNO?\n\nTo usunie:\n- Twoje konto\n- Wszystkie ogłoszenia\n- Dane osobowe\n\nOceny zostaną anonimizowane.\n\nTej akcji nie można cofnąć!')) {
                return;
            }
            
            const confirmation = prompt('OSTATNIA SZANSA!\n\nWpisz "USUŃ" aby potwierdzić:');
            if (confirmation !== 'USUŃ') {
                return;
            }
            
            const user = await getCurrentUser();
            
            try {
                // 1. Anonymize reviews
                await supabase
                    .from('reviews')
                    .update({ 
                        comment: '[usunięto]',
                        photo_url: null 
                    })
                    .eq('reviewer_id', user.id);
                
                // 2. Delete listings
                await supabase
                    .from('listings')
                    .delete()
                    .eq('user_id', user.id);
                
                // 3. Delete from users table
                await supabase
                    .from('users')
                    .delete()
                    .eq('id', user.id);
                
                // 4. Sign out
                await supabase.auth.signOut();
                
                alert('✅ Konto usunięte zgodnie z RODO.\n\nPrzykro nam że odchodzisz! 😢\n\nJeśli kiedyś wrócisz - zawsze mile widziany/a!');
                window.location.href = '/';
                
            } catch (error) {
                console.error('Delete account error:', error);
                alert('❌ Błąd podczas usuwania konta: ' + error.message);
            }
        }
        
        // ============================================
        // PLACEHOLDER FUNCTIONS (implement these)
        // ============================================
        
        async function getCurrentUser() {
            const { data: { user } } = await supabase.auth.getUser();
            return user;
        }
        
        async function getListingById(id) {
            const { data } = await supabase
                .from('listings')
                .select('*')
                .eq('id', id)
                .single();
            return data;
        }
